<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YRSF Blog | Luxury Yachting in South Florida</title>
  <meta name="description" content="Read the latest tips, guides, and stories about luxury yacht rentals and charters in Miami and South Florida."/>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

 display: ["Montserrat"], body: ["Montserrat"], label: ["Montserrat"]}, fontSize: {"display-lg": ["48px", {lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700"}], "label-md": ["14px", {lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600"}], "body-md": ["16px", {lineHeight: "1.5", fontWeight: "400"}], "headline-md": ["24px", {lineHeight: "1.3", fontWeight: "600"}], caption: ["12px", {lineHeight: "1.4", fontWeight: "500"}], "headline-lg": ["32px", {lineHeight: "1.2", fontWeight: "700"}], "headline-lg-mobile": ["28px", {lineHeight: "1.2", fontWeight: "700"}], "body-lg": ["18px", {lineHeight: "1.6", fontWeight: "400"}]}}}};</script>
  <link rel="stylesheet" href="/css/shared.css"/>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen">
  
  <div id="header-placeholder"></div>

  <!-- Hero Section -->
  <section class="relative pt-[120px] pb-16 lg:pt-[140px] lg:pb-24 overflow-hidden bg-surface-container-lowest">
    <div class="absolute inset-0 opacity-40 pointer-events-none" style="background-image: radial-gradient(var(--outline-variant) 1px, transparent 1px); background-size: 24px 24px;"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-surface pointer-events-none"></div>
    
    <div class="max-w-container-max mx-auto relative z-10 px-md">
      <div class="max-w-3xl mx-auto text-center">
        <span class="inline-block px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full font-label text-caption mb-4">Latest Insights</span>
        <h1 class="font-display text-display-lg text-on-surface mb-6 font-bold tracking-tight">YRSF Blog</h1>
        <p class="font-body text-body-lg text-on-surface-variant max-w-2xl mx-auto">
          Discover everything you need to know about luxury yachting in South Florida. From hidden sandbars to hosting the perfect yacht party, our experts share their insider tips.
        </p>
      </div>
    </div>
  </section>

  <!-- Blog Grid -->
  <main class="flex-grow py-xl">
    <div class="max-w-container-max mx-auto px-md">
      <!-- Filter Bar -->
      <div class="flex flex-wrap items-center gap-4 mb-xl">
        <div class="relative flex-1 min-w-[200px]">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant">search</span>
          <input type="text" id="blog-search" class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-secondary focus:border-secondary transition-all font-body-md" placeholder="Search articles..."/>
        </div>
        <select id="blog-sort" class="bg-surface-container-lowest border border-outline-variant rounded-lg pl-4 pr-10 py-3 font-body-md text-on-surface focus:ring-secondary focus:border-secondary">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="az">Title A-Z</option>
          <option value="za">Title Z-A</option>
        </select>
        <div class="hidden lg:flex items-center gap-2 px-4 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest h-[48px] ml-auto">
          <span class="material-symbols-outlined text-on-surface-variant text-[24px]">view_comfy</span>
          <input type="range" id="blog-grid-slider" min="2" max="5" value="4" class="w-24 accent-secondary cursor-pointer" title="Adjust Card Size" />
          <span class="material-symbols-outlined text-on-surface-variant text-[16px]">grid_on</span>
        </div>
      </div>

      <!-- Tailwind Safelist: lg:grid-cols-2 lg:grid-cols-3 lg:grid-cols-4 lg:grid-cols-5 md:grid-cols-2 md:grid-cols-3 md:grid-cols-4 -->
      <div id="blog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 transition-all duration-300">
        <div class="col-span-full text-center py-xl">
          <div class="w-8 h-8 border-4 border-secondary border-t-transparent rounded-full animate-spin mx-auto"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="/js/pages/blog.js"></script>
</body>
</html>
