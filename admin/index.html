<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | YRSF</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="manifest" href="/admin/manifest.json"/>
  <meta name="theme-color" content="#455f88"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="YRSF Admin"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' fill='%23455f88'><rect width='512' height='512' rx='100' fill='%23455f88'/><path d='M256 160l-120 180h240L256 160z' fill='white'/></svg>"/>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/admin/sw.js').catch(e => console.warn('SW reg failed:', e));
      });
    }
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>tailwind.config = {darkMode: "class", theme: {extend: {colors: {secondary: "#455f88", "on-secondary": "#ffffff", "surface-container": "#eeeeee", "surface-container-lowest": "#ffffff", "outline-variant": "#c4c7c8", "on-surface": "#1a1c1c", "on-surface-variant": "#444748", surface: "#f9f9f9", error: "#ba1a1a", "on-error": "#ffffff", "error-container": "#ffdad6", "on-error-container": "#93000a"}, spacing: {md: "24px", lg: "48px", xl: "80px"}, fontFamily: {display: ["Montserrat"], body: ["Montserrat"], label: ["Montserrat"], headline: ["Montserrat"]}, fontSize: {"display-lg": ["48px", {lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700"}], "label-md": ["14px", {lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600"}], "body-md": ["16px", {lineHeight: "1.5", fontWeight: "400"}], "headline-md": ["24px", {lineHeight: "1.3", fontWeight: "600"}]}}}};</script>
  <link rel="stylesheet" href="/css/shared.css"/>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center px-md">
  <div class="w-full max-w-md">
    <div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg">
      <div class="text-center mb-lg">
        <h1 class="font-display text-display-lg text-secondary font-bold mb-2">YRSF</h1>
        <p class="font-body text-body-md text-on-surface-variant">Admin Portal</p>
      </div>

      <!-- Error Message -->
      <div class="hidden bg-error-container text-on-error-container px-4 py-3 rounded-lg mb-md flex items-center gap-2" id="login-error">
        <span class="material-symbols-outlined text-[18px]">error</span>
        <span id="login-error-text"></span>
      </div>

      <form id="login-form" class="flex flex-col gap-md">
        <div>
          <label class="block font-label text-label-md text-on-surface-variant mb-2" for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            class="w-full px-4 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest font-body text-body-md focus:ring-secondary focus:border-secondary transition-all"
            placeholder="admin@yrsf.com"
          />
        </div>
        <div>
          <label class="block font-label text-label-md text-on-surface-variant mb-2" for="password">Password</label>
          <div class="relative">
            <input
              type="password"
              id="password"
              name="password"
              required
              autocomplete="current-password"
              class="w-full px-4 py-3 pr-12 border border-outline-variant rounded-lg bg-surface-container-lowest font-body text-body-md focus:ring-secondary focus:border-secondary transition-all"
              placeholder="••••••••"
            />
            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" id="toggle-password" aria-label="Toggle password visibility">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>
        <button
          type="submit"
          id="login-btn"
          class="w-full bg-secondary text-on-secondary py-3 rounded-lg font-label text-label-md hover:opacity-90 transition-all flex items-center justify-center gap-2"
        >
          <span id="login-btn-text">Sign In</span>
          <span class="admin-spinner hidden" id="login-spinner"></span>
        </button>
      </form>

      <p class="text-center mt-md text-on-surface-variant font-body text-body-md">
        <a href="/" class="text-secondary hover:opacity-80 transition-colors">&larr; Back to Website</a>
      </p>
    </div>
  </div>

  <script type="module" src="/js/pages/admin-login.js"></script>
</body>
</html>
