<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YRSF Blog</title>
  <meta name="description" content=""/>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <!-- marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {"on-secondary-fixed-variant": "#2c476f", "secondary-fixed": "#d5e3ff", "on-tertiary-container": "#4c7b9a", "secondary-fixed-dim": "#adc8f6", "surface-container": "#eeeeee", "surface-container-low": "#f3f3f4", "outline-variant": "#c4c7c8", secondary: "#455f88", "on-surface": "#1a1c1c", "on-primary": "#ffffff", "surface-dim": "#dadada", "on-primary-fixed-variant": "#454747", "surface-container-lowest": "#ffffff", "secondary-container": "#b5d0ff", "on-error-container": "#93000a", "on-secondary-container": "#3e5981", "primary-container": "#ffffff", tertiary: "#336381", "inverse-on-surface": "#f0f1f1", error: "#ba1a1a", "on-tertiary-fixed-variant": "#164b68", "on-tertiary-fixed": "#001e2e", "on-secondary-fixed": "#001b3c", "error-container": "#ffdad6", "surface-container-highest": "#e2e2e2", "surface-bright": "#f9f9f9", "on-tertiary": "#ffffff", "on-primary-fixed": "#1a1c1c", primary: "#5d5f5f", "primary-fixed-dim": "#c6c6c7", background: "#f9f9f9", "on-secondary": "#ffffff", "surface-container-high": "#e8e8e8", surface: "#f9f9f9", "on-surface-variant": "#444748", "inverse-surface": "#2f3131", "surface-variant": "#e2e2e2", "tertiary-container": "#ffffff", "on-error": "#ffffff", "tertiary-fixed": "#c8e6ff", "primary-fixed": "#e2e2e2", "inverse-primary": "#c6c6c7", "surface-tint": "#5d5f5f", "on-primary-container": "#747676", outline: "#747878", "on-background": "#1a1c1c", "tertiary-fixed-dim": "#9eccef"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, spacing: {md: "24px", lg: "48px", xl: "80px", sm: "12px", "container-max": "1280px", gutter: "24px", base: "8px", xs: "4px"}, fontFamily: {"display-lg": ["Montserrat"], "label-md": ["Montserrat"], "body-md": ["Montserrat"], "headline-md": ["Montserrat"], caption: ["Montserrat"], "headline-lg": ["Montserrat"], "headline-lg-mobile": ["Montserrat"], "body-lg": ["Montserrat"], headline: ["Montserrat"], display: ["Montserrat"], body: ["Montserrat"], label: ["Montserrat"]}, fontSize: {"display-lg": ["48px", {lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700"}], "label-md": ["14px", {lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600"}], "body-md": ["16px", {lineHeight: "1.5", fontWeight: "400"}], "headline-md": ["24px", {lineHeight: "1.3", fontWeight: "600"}], caption: ["12px", {lineHeight: "1.4", fontWeight: "500"}], "headline-lg": ["32px", {lineHeight: "1.2", fontWeight: "700"}], "headline-lg-mobile": ["28px", {lineHeight: "1.2", fontWeight: "700"}], "body-lg": ["18px", {lineHeight: "1.6", fontWeight: "400"}]}}}};</script>
  <link rel="stylesheet" href="/css/shared.css"/>
  <style>
    /* Add some custom typography tweaks to standard markdown elements */
    .prose h1, .prose h2, .prose h3 { font-family: 'Montserrat', sans-serif; font-weight: 700; color: #1a1c1c; }
    .prose a { color: #455f88; text-decoration: underline; }
    .prose a:hover { opacity: 0.8; }
    .prose img { border-radius: 0.75rem; border: 1px solid #e2e2e2; }
    .prose blockquote { border-left-color: #455f88; background-color: #f3f3f4; padding: 1rem; border-radius: 0 0.5rem 0.5rem 0; font-style: normal; }
  </style>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen">
  
  <div id="header-placeholder"></div>

  <!-- Loading State -->
  <div id="loading-state" class="flex-grow flex items-center justify-center pt-32 pb-16">
    <div class="w-12 h-12 border-4 border-secondary border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- Error State -->
  <div id="error-state" class="hidden flex-grow flex items-center justify-center pt-32 pb-16">
    <div class="text-center">
      <h2 class="font-headline text-headline-lg font-bold mb-4">Post Not Found</h2>
      <a href="/blog.html" class="inline-block bg-secondary text-on-secondary px-6 py-3 rounded-lg font-label font-bold">Back to Blog</a>
    </div>
  </div>

  <!-- Blog Article -->
  <main id="blog-content-wrapper" class="hidden flex-grow pt-[120px] pb-16 lg:pt-[140px] lg:pb-24">
    <article class="max-w-4xl mx-auto px-md">
      <header class="mb-lg text-center">
        <div class="mb-6 inline-flex gap-2 text-on-surface-variant font-label text-[12px] uppercase tracking-wider items-center justify-center w-full">
          <time id="post-date"></time>
        </div>
        <h1 id="post-title" class="font-display text-[32px] md:text-[48px] font-bold text-on-surface leading-tight mb-6"></h1>
        <p id="post-excerpt" class="font-body text-body-lg text-on-surface-variant max-w-2xl mx-auto"></p>
      </header>

      <div id="post-image-wrapper" class="hidden mb-lg rounded-2xl overflow-hidden border border-outline-variant shadow-sm max-w-5xl mx-auto">
        <img id="post-image" src="" alt="" class="w-full h-auto object-cover max-h-[600px]"/>
      </div>

      <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant p-6 md:p-12 shadow-sm">
        <!-- Rendered Markdown goes here -->
        <div id="post-body" class="prose prose-lg md:prose-xl max-w-none prose-neutral font-body text-on-surface"></div>
      </div>
      
      <div class="mt-12 text-center border-t border-outline-variant pt-8">
        <a href="/blog.html" class="inline-flex items-center gap-2 font-label text-label-md text-secondary hover:underline">
          <span class="material-symbols-outlined text-[18px]">arrow_back</span> Back to all posts
        </a>
      </div>
    </article>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module" src="/js/pages/post.js"></script>
</body>
</html>
